- name: Setup InfluxDB repository and install InfluxDB v1
  hosts: all
  become: yes
  tasks:
    # Ajouter la clé GPG pour le dépôt InfluxDB
    - name: Import InfluxDB GPG signing key
      ansible.builtin.apt_key:
        url: https://repos.influxdata.com/influxdb.key
        state: present

    # Ajouter le dépôt APT pour InfluxDB
    - name: Add InfluxDB repository
      ansible.builtin.apt_repository:
        repo: "deb https://repos.influxdata.com/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present
        update_cache: yes

    # Installer InfluxDB
    - name: Install InfluxDB package
      ansible.builtin.apt:
        name: influxdb
        state: present

    # Activer et démarrer le service InfluxDB
    - name: Enable and start InfluxDB service
      ansible.builtin.service:
        name: influxdb
        enabled: true
        state: started

    # Activer le monitoring
    - name: Configuration du service (niveau user)
      ansible.builtin.template:
        src: templates/monit.conf.influxdb.j2
        dest: "/home/pi/monit/include/influxdb"
        mode: '0600'
      become: no
      notify: Restart Monit
